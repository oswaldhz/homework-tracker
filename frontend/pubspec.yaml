name: homework_tracker
description: Moodle homework tracker - cross-platform desktop and mobile app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  cupertino_icons: ^1.0.6
  table_calendar: ^3.1.2
  url_launcher: ^6.2.5
  file_picker: ^6.1.1
  sqflite_common_ffi: ^2.3.0
  encrypt: ^5.0.3
  path_provider: ^2.1.0
  html: ^0.15.4
  path: ^1.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
